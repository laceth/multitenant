apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workloads-tenant-movie
  namespace: argocd
spec:
  description: movie tenant

  sourceRepos:
  - https://github.com/laceth/multitenant.git
  - https://kubernetes.github.io/ingress-nginx
  - https://metallb.github.io/metallb

  destinations:
  - name: '*'
    namespace: tenant-movie
  - name: '*'
    namespace: tenant-movie-*
  - server: '*'
    namespace: tenant-movie
  - server: '*'
    namespace: tenant-movie-*

  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
